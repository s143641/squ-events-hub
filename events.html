<!--page title-->
<div class="container text-center py-4 ">
  <h2>Events</h2>
  <p class="text-secondary">Explore university activities</p>
</div>

<!--search events by name-->
<div class="container text-center mb-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
  <input type="text" id="search" class="form-control" placeholder="Search event...">
        </div>
    </div>
    <!--Search button-->
  <button class="btn btn-secondary mt-2" onclick="searchEvent()">Search</button> 
  <hr/>
<br/>
</div>



<!--table to display events dynamically-->
<div class="container">
<table class="table table-bordered text-center" id="eventTable">

<tr class="table-dark">
<th>Event</th>
<th>Date</th>
<th>Location</th>
<th>Category</th>
</tr>

</table>

<hr/>
<br/> 
</div>
 <!-- Add new events-->
<div class="container mb-4 text-center">
    <h3 class="mb-0 text-center ">Add A New Event</h3>
    <h6 class="text-center text-secondary mb-3">Write the Event's Information Below</h6>
    <div class="row justify-content-center">
        <div class="col-md-4">

  <input type="text" id="name" class="form-control mb-2" placeholder="Event Name">
  <input type="text" id="date" class="form-control mb-2" placeholder="Date">
  <input type="text" id="location" class="form-control mb-2" placeholder="Location">
  <input type="text" id="category" class="form-control mb-2" placeholder="Category">
   <!--checkbox of confirming-->
  <div class="form-check text-start mb-3">
    <input class="form-check-input" type="checkbox" id="confirm">
    <label class="form-check-label" for="confirm"> I confirm this event information is correct</label>
  </div>
  <!--add event button-->
  <button class="btn btn-secondary" onclick="addEvent() ">Add Event</button>
  </div>
    </div>
</div>


<!--footer-->
<footer class="bg-dark text-white text-center p-3">
    <p class="mb-0">&copy; 2026 SQU Events Hub</p>
</footer>


<script>

// creat event object to store event details.
function Event(name, date, location, category){
  this.name = name;
  this.date = date;
  this.location = location;
  this.category = category;
}

//store all events inside an array.
let events = [
  new Event("AI Workshop 2026","20 March 2026","CS Lab","Academic"),
  new Event("Cultural Festival","5 April 2026","Main Hall","Cultural"),
  new Event("Leadership Seminar","15 April 2026","Auditorium","Workshop")
];

//display events dynamically in the table.
function displayEvents(list){

  let table = document.getElementById("eventTable");

  table.innerHTML = `
  <tr class="table-dark">
    <th>Event</th>
    <th>Date</th>
    <th>Location</th>
    <th>Category</th>
  </tr>
  `;

 for(let i=0;i<list.length;i++){
  table.innerHTML+=
"<tr>"+
"<td>"+list[i].name+"</td>"+
"<td>"+list[i].date+"</td>"+
"<td>"+list[i].location+ "</td>"+
"<td>"+list[i].category+ "</td>"+
"</tr>";
 }

}

//add new event to the array and update the table.
function addEvent(){

  let name = document.getElementById("name").value;
  let date = document.getElementById("date").value;
  let location = document.getElementById("location").value;
  let category = document.getElementById("category").value;
  let confirm=document.getElementById("confirm").checked;

  //validation.
  if(name==="" || date==="" || location==="" || category===""){
    alert("Please Fill All Fields!");
    return false;
  }
  if(!confirm){
    alert("Please Confirm the event information!");
    return false;
  }

  let newEvent = new Event(name, date, location, category);
  //add the new event to the table
  events.push(newEvent);
  displayEvents(events);
  //show an alert after add the event
  alert("Event added Successfully!"); 
  //reset all fields
  document.getElementById("name").value="";
  document.getElementById("date").value="";
  document.getElementById("location").value="";
  document.getElementById("category").value="";
  document.getElementById("confirm").checked=false;


}

//search events by name and display matching results.
function searchEvent(){
  //get the keyword entered by the user and convert it to lowercase.
  // to make the search case-insensitive.
  let keyword = document.getElementById("search").value.toLowerCase();
  //creat an empty array to store matching events
  let result=[];
  //loop through all events in the array
  for(let i=0;i<events.length;i++){
    //convert event name to lowercase for comparison.
    let eventName=events[i].name.toLowerCase();
    //check if the event name contains the keyword
    // indexOf return -1 if not found
    if(eventName.indexOf(keyword)!== -1){
      //if found add event to result array
      result.push(events[i])
    }
  }
  //display only the matching events in the table
  displayEvents(result);

}

//load all events when the page opens
displayEvents(events);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
