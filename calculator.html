<!--calculator section for ticket pricing-->
<div class="container mt-5">
  <div class="row justify-content-center">

    <div class="col-md-4 mb-4">
      <!--calculator card-->
      <div class="bg-dark text-white p-4 rounded shadow text-center">
  
        <h4 class="text-warning">Event Calculator</h4>
        <h6 class="mb-3"> Enter number of tickets : </h6>

        <!-- display screen for number of tickets -->
        <input type="text" id="display" class="form-control mb-3 text-center" value="0" >

        <!--numbers buttons -->
        <button class="btn btn-light m-1" onclick="addValue(1)">1</button>
        <button class="btn btn-light m-1" onclick="addValue(2)">2</button>
        <button class="btn btn-light m-1" onclick="addValue(3)">3</button>

        <br>

        <button class="btn btn-light m-1" onclick="addValue(4)">4</button>
        <button class="btn btn-light m-1" onclick="addValue(5)">5</button>
        <button class="btn btn-light m-1" onclick="addValue(6)">6</button>

        <br>

        <button class="btn btn-light m-1" onclick="addValue(7)">7</button>
        <button class="btn btn-light m-1" onclick="addValue(8)">8</button>
        <button class="btn btn-light m-1" onclick="addValue(9)">9</button>

        <br>

        <button class="btn btn-light m-1" onclick="addValue(0)">0</button>

        <!-- clear button -->
        <button class="btn btn-secondary m-1" onclick="clearDisplay()">C</button>

        <br><br>

        <!-- ticket price-->
         <label class="mb-2"> Enter ticket price per ticket (OMR) :</label>
        <input type="number" id="price" class="form-control mb-3" placeholder="Ticket Price">

        <!-- Age-->
         <label class="mb-2"> Enter Your Age :</label>
        <input type="number" id="age" class="form-control mb-3" placeholder="Your Age">

        <!-- final calculate button-->
        <button class="btn btn-warning" onclick="calculateTotal()">
          Calculate Total
        </button>

        <!-- the result -->
        <h5 class="mt-3" id="resultText"></h5>

      </div>

    </div>

  </div>
</div>

<!--footer-->
<footer class="bg-dark text-white text-center p-3">
    <p class="mb-0">&copy; 2026 SQU Events Hub</p>
</footer>

<script>

// add numbers only to display
function addValue(val){
  let display = document.getElementById("display");
  //replace 0 with first entered number
  if(display.value === "0"){
    display.value = val;
  }else{
    display.value += val;
  }
}
//clear display and result
function clearDisplay(){
  document.getElementById("display").value = "0";
  document.getElementById("resultText").innerHTML = "";
}

// function to calculate total ticket cost with discount
function calculateTotal(){
  //get values entered by the user from input fields
  let tickets = document.getElementById("display").value;
  let price = document.getElementById("price").value;
  let age = document.getElementById("age").value;


    // check if any inputs fields are empty
  if(tickets === "" || price === "" || age === ""){
    alert("Please fill all fields!");
    return;
  }
  
  //convert values to Numbers
  tickets = Number(tickets);
  price = Number(price);
  age = Number(age);

  //check if tickets is a valid number
  if(isNaN(tickets)){
    alert("Enter valid number of tickets!");
    return;
  }

  //calculate total cost
  let total = tickets * price;

    // apply discount if age>=60
  if(age >= 60){
    total = total - (total * 0.10);
    alert("10% discount applied!");
  }
  
  // display the result to user
  document.getElementById("resultText").innerHTML =
  "Total Amount = " + total + " OMR";


}


</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
