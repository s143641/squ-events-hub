<!--feedback form container-->
<div class="container mt-5 mb-5">

  <div class="row justify-content-center">

    <div class="col-md-6">

      <div class="bg-dark text-white p-4 rounded shadow">

        <h4 class="text-center mb-4">Event Feedback Form</h4>
        <!--form to collect user feedback-->
        <form onsubmit="return validateFeedback() " id="myForm">

          <!-- input field for name -->
          <label class="form-label">Your Name</label>
          <input type="text" id="name" class="form-control mb-3" placeholder="Enter your name" required>

          <!-- radio buttons for attendance -->
          <label class="form-label">Did you attend any SQU event?</label>

          <div class="form-check">
            <input class="form-check-input" type="radio" name="attend" value="Yes" >
            <label class="form-check-label">Yes</label>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="radio" name="attend" value="No" >
            <label class="form-check-label">No</label>
          </div>

          <!-- checkbox options -->
          <label class="form-label">Which events do you prefer?</label>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="check1">
            <label class="form-check-label">Workshops</label>
          </div>

          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="check2">
            <label class="form-check-label">Seminars</label>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="check3">
            <label class="form-check-label">Cultural Events</label>
          </div>

          <!-- select dropdown for rating -->
          <label class="form-label">How do you rate our platform?</label>
          <select id="rating" class="form-select mb-3">
            <option value="">Select rating</option>
            <option>Excellent</option>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
          </select>

          <!-- textarea for suggestions -->
          <label class="form-label">Any suggestions?</label>
          <textarea id="suggestion" class="form-control mb-3" placeholder="Write your suggestions here..."></textarea>

          <div class="text-center">
            <button type="submit" class="btn btn-warning">Submit Feedback</button>
          </div>

        </form>

      </div>

    </div>

  </div>

</div>

<!--footer-->
<footer class="bg-dark text-white text-center p-3">
    <p class="mb-0">&copy; 2026 SQU Events Hub</p>
</footer>

<script>

//validate feedback form inputs
function validateFeedback(){
let name = document.getElementById("name").value;
let rating = document.getElementById("rating").value;

// check if name is empty
if(name === ""){
  alert("Please enter your name!");
  return false;
}
//check if the name matches the required pattern.
//pattern means: only letters(A-Z) or(a-z) and at least 3 characters.
if(name.search(/^[A-Za-z]{3,}$/)==-1){
  //if the pattern is NOT matched , show this message.
  alert("Name must be at least 3 characters!");
  return false;
}

// check if radio button is selected
let radios = document.getElementsByName("attend");
let selected = false;

for(let i = 0; i < radios.length; i++){
  if(radios[i].checked){
    selected = true;
  }
}
//if no radio selected
if(selected === false){
  alert("Please select if you attended an event!");
  return false;
}

//checkbox check
let c1=document.getElementById("check1").checked;
let c2=document.getElementById("check2").checked;
let c3=document.getElementById("check3").checked;
if (c1===false&&c2===false&&c3===false){
  alert("Please select at least one preferred event!");
  return false;
}
// check if rating selected
if(rating === ""){
  alert("Please select a rating!");
  return false;
}

// show success message
alert("Thank you for your feedback!");

//reset form
document.getElementById("myForm").reset();

return false;
}



</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
