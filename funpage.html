<!--Game container-->
<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <!--game card-->
      <div class="bg-dark text-white p-4 rounded shadow text-center">

        <h4>Fun Game</h4>
        <p id="questionBox"></p>

        <!-- options -->
         <div id="optionsBox">
        <button class="btn btn-light m-2" id="btn1" onclick="checkAnswer(1)"></button>
        <button class="btn btn-light m-2" id="btn2" onclick="checkAnswer(2)"></button>
        <button class="btn btn-light m-2" id="btn3" onclick="checkAnswer(3)"></button>
        </div>
         <!--result message-->
        <p class="mt-3" id="resultText"></p>

        <!-- next button-->
        <button id="nextBtn" class="btn btn-warning mt-2" onclick="nextQuestion()">
          Next
        </button>

      

        <hr>

        <!-- Progress bar -->
        <p>Progress</p>
        <div class="progress">
          <div id="progressBar" class="progress-bar bg-success" style="width:0%">
            0%
          </div>
        </div>

      </div>

    </div>
  </div>
</div>


<!--footer-->
<footer class="bg-dark text-white text-center p-3 mt-auto">
    <p class="mb-0">&copy; 2026 SQU Events Hub</p>
</footer>

<script>

// Questions & Options
let questions = [
  "Which event teaches AI?",
  "Which event celebrates cultures?",
  "Which event improves leadership?",
  "Where is AI Workshop held?",
  "Which is a cultural event?"
];

let option1 = [
  "AI Workshop 2026",
  "Leadership Seminar",
  "Sports Day",
  "CS Lab",
  "AI Workshop"
];

let option2 = [
  "Cultural Festival",
  "Cultural Festival",
  "Leadership Seminar",
  "Main Hall",
  "Cultural Festival"
];

let option3 = [
  "Sports Day",
  "Programming Contest",
  "Art Show",
  "Auditorium",
  "Seminar"
];

// Correct answers
let correct = [1, 2, 2, 1, 2];

// Game Variables
let index = 0;
let score = 0;
//prevent answering the same question multiple times
let answered = false;

// Load and Display Question
function loadQuestion(){
  //display the current question
  document.getElementById("questionBox").innerHTML = questions[index];
  //display answer options
  document.getElementById("btn1").innerHTML = option1[index];
  document.getElementById("btn2").innerHTML = option2[index];
  document.getElementById("btn3").innerHTML = option3[index];
  //clear the previous result message
  document.getElementById("resultText").innerHTML = "";
  //allow the user to answer the new question
  answered = false;
}


// Check if selected answer is correct
function checkAnswer(choice){
  //prevent answering more than once for the same question
  if(answered === true){
    return;
  }
  //make question as answered
  answered = true;
  //get the correct answer for the current question
  let correctAnswer = correct[index];
  //check if user choice matches the correct answer
  if(choice === correctAnswer){
    score++; //increase score if correct
    document.getElementById("resultText").innerHTML = "Correct!";
  }else{
    let correctText = "";
    //determine which answer is correct
    if(correctAnswer === 1){
      correctText = option1[index];
    }else if(correctAnswer === 2){
      correctText = option2[index];
    }else{
      correctText = option3[index];
    }
    //display wrong message with the correct answer
    document.getElementById("resultText").innerHTML =
    "Wrong! Correct answer is: " + correctText;
  }

  updateProgress();
}


//Move to Next Question or finish game
function nextQuestion(){
  index++;
  if(index < questions.length){
    loadQuestion();
  }else{
    //show final result and restart button
    document.getElementById("questionBox").innerHTML =
    "Your Score = " + score;
     //show restart button
     document.getElementById("resultText").innerHTML = "Good job <br><br> " +
    "<button class='btn btn-success' onclick='restartGame()'> Play Again </button>";
    //remove options completely
    document.getElementById("optionsBox").innerHTML="";

        //remove next button text
    document.getElementById("nextBtn").innerHTML="";
   
  }
}


// Restart Game
function restartGame(){
  index = 0;
  score = 0;

//restore options buttons
document.getElementById("optionsBox").innerHTML=
"<button class='btn btn-light m-2' id='btn1' onclick='checkAnswer(1)'></button>"+
"<button class='btn btn-light m-2' id='btn2' onclick='checkAnswer(2)'></button>"+
"<button class='btn btn-light m-2' id='btn3' onclick='checkAnswer(3)'></button>";

//Restore next button
document.getElementById("nextBtn").innerHTML="Next";

//Reset progress bar
  document.getElementById("progressBar").style.width = "0%";
  document.getElementById("progressBar").innerHTML = "0%";

  loadQuestion();
}


// Update Progress bar
function updateProgress(){
  let percent = ((index + 1) / questions.length) * 100;

  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressBar").innerHTML = Math.floor(percent) + "%";
}


// Start Game
loadQuestion();

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
